    // 采用特征路由作为持久化 Key，保证不同页面不互相覆盖密码
    const storageKey = "vault_auth_" + btoa(location.pathname).replace(/=/g, '');

    async function getCryptoKey(password) {
        const enc = new TextEncoder();
        const hash = await crypto.subtle.digest('SHA-256', enc.encode(password));
        return await crypto.subtle.importKey('raw', hash, { name: 'AES-GCM' }, false, ['decrypt']);
    }

    async function decryptData(base64Str, password) {
        try {
            const binaryStr = atob(base64Str);
            const combined = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                combined[i] = binaryStr.charCodeAt(i);
            }
            const iv = combined.slice(0, 12);
            const data = combined.slice(12);
            
            const key = await getCryptoKey(password);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, data);
            return new TextDecoder().decode(decrypted);
        } catch (e) {
            return null;
        }
    }

    async function verify() {
        const pwd = document.getElementById('password').value.trim();
        if(!pwd) return;
        await tryUnlock(pwd, true);
    }

    async function tryUnlock(pwd, isManual) {
        const html = await decryptData(ciphertext, pwd);
        if(html) {
            localStorage.setItem(storageKey, pwd); // 成功则永久记录免密
            renderHtml(html);
        } else {
            if(isManual) {
                document.getElementById('errorMsg').style.color = '#f87171';
                document.getElementById('errorMsg').innerText = "❌ 密钥不正确，请重新输入";
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('password').value = '';
            } else {
                localStorage.removeItem(storageKey);
                document.getElementById('authBox').style.display = 'block';
            }
        }
    }

    function renderHtml(html) {
        document.open();
        document.write(html);
        document.close();
    }

    window.onload = async () => {
        const savedPwd = localStorage.getItem(storageKey);
        if(savedPwd) {
            await tryUnlock(savedPwd, false);
        } else {
            document.getElementById('authBox').style.display = 'block';
        }
    };
</script>
</body>
</html>
